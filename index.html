<!DOCTYPE html>
<html lang="en">
<head>
    <title>Amazon Clone</title>
     <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
<body>
    <header>
    <div class="navBar">
        <div class="amazon-logo">
            <div class="logo"></div>
        </div>

     <div class="nav-Address">
          <p class="add-1"> Delivering to</p>
        <div class="add-icon">
          <i class="fa-solid fa-location-dot"></i>
          <p class="add-2">Update location</p>
        </div>
      </div>

      <div class="nav-search">
          <select class="search-content" name="search-select" id="search-select">
            <option value="search-select">All</option>
            <option value="search-select">Alexa Skills</option>
            <option value="search-select">Amazon Device</option>
            <option value="search-select">Amazon Fashion</option>
            <option value="search-select">Amazon Pharmacy</option>
          </select>
         <input placeholder="Search Amazon"class="search-input">
            <div class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
      </div>

      <div class="nav-lang">
          <i class="fa-regular fa-flag"></i>
          <p class="lang-para">Eng</p>
      </div>

      <div class="nav-signin">
        <p class="list-1">Hello, sign in </p>
        <p class="list-2">Account & Lists </p>
      </div>

      <div class="nav-orders">
        <p class="list-1">Returns</p>
        <p class="list-2">& Orders </p>
      </div>

      <div class="nav-cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <p class="cart-para">cart</p>
      </div>

    </div>
    </header>
</body>
</html>
